<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIENVENIDA/O</title>
  <meta name="description" content="MASOTERAPIA FUNCIONAL A TU ALCANCE" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <!-- Base styles -->
  <link rel="stylesheet" href="/shared/css/base.css" />

  <style>
    :root {
      --color-bg:           #060910;
      --color-bg-2:         #0a0f1a;
      --color-bg-3:         #0f1624;
      --color-surface:      rgba(255,255,255,0.032);
      --color-surface-2:    rgba(255,255,255,0.058);
      --color-border:       rgba(100,140,200,0.10);
      --color-border-2:     rgba(100,140,200,0.18);
      --color-text:         #dde3ef;
      --color-text-muted:   #5e6b82;
      --color-text-dim:     #8a97ae;
      --color-accent:       #5b9bd5;
      --color-accent-2:     #84bef0;
      --color-accent-glow:  rgba(91,155,213,0.16);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
    }

    .landing-wrapper {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .landing-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-accent);
      opacity: 0.8;
      margin-bottom: 1.5rem;
    }

    .landing-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 300;
      line-height: 1.05;
      color: #fff;
      margin-bottom: 1rem;
    }

    .landing-sub {
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 300;
      color: var(--color-text-muted);
      margin-bottom: 3rem;
    }

    .presentations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .pres-card {
      display: block;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.45s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }

    .pres-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
      opacity: 0.4;
    }

    .pres-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(91,155,213,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .pres-card:hover {
      border-color: rgba(91,155,213,0.3);
      transform: translateY(-4px);
      box-shadow: 0 16px 50px rgba(0,0,0,0.6), 0 0 30px rgba(91,155,213,0.1);
    }

    .pres-tag {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .pres-tag::before {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--color-accent);
      opacity: 0.5;
    }

    .pres-name {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 300;
      color: #fff;
      margin-bottom: 0.5rem;
      line-height: 1.15;
    }

    .pres-role {
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--color-text-muted);
      margin-bottom: 1.5rem;
    }

    .pres-arrow {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.3s, gap 0.3s;
    }

    .pres-card:hover .pres-arrow {
      color: var(--color-accent);
      gap: 0.75rem;
    }

    .landing-footer {
      margin-top: 4rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <div id="progress-bar"></div>

  <div class="landing-wrapper">
    <p class="landing-eyebrow"></p>
    <h1 class="landing-title"><br><em style="font-style:italic;color:var(--color-accent-2)"></em></h1>
    <p class="landing-sub">.</p>

    <div class="presentations-grid">
      <a href="/brands/luis/" class="pres-card">
        <p class="pres-tag">Bienestar funcional</p>
        <h2 class="pres-name">Luis Hernán<br>González</h2>
        <p class="pres-role">Masajista Funcional · Chile</p>
        <div class="pres-arrow">
          <span>
          <span>→</span>
        </div>
      </a>
      
    </div>

    <p class="landing-footer"
  </div>

  <script>
    // Simple scroll progress for landing
    const bar = document.getElementById('progress-bar');
    window.addEventListener('scroll', () => {
      const pct = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
      bar.style.width = pct + '%';
    }, { passive: true });
  </script>
</body>
</html>
